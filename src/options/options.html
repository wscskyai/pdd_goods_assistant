<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDD 助手设置</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC",
          "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        margin: 0;
        padding: 16px;
      }
      .row {
        margin-bottom: 12px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #666;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        max-width: 520px;
        padding: 8px 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      button {
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
      }
      .hint {
        margin-top: 10px;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h2>PDD Goods Assistant 设置</h2>
    <div class="row">
      <label for="pddDomainHint">域名提示（用于匹配页面）</label>
      <input id="pddDomainHint" placeholder="例如：pinduoduo.com" />
    </div>
    <button id="btnSave">保存</button>
    <div id="hint" class="hint"></div>

    <script type="module" src="./options.js"></script>
  </body>
</html>
